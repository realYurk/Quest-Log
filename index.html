<!DOCTYPE html>
<html lang="zh-CN" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quest Log · 任务日志</title>
    <script>
      // Apply saved theme BEFORE any rendering (prevents flash)
      try {
        const t = localStorage.getItem('questlog-theme') || 'light'
        document.documentElement.className = t
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
